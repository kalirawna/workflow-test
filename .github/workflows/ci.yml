name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Use actions/checkout@v6
        uses: actions/checkout@v6

      - name: Use actions/setup-deno@v2
        uses: denoland/setup-deno@v2
        with:
          version: v2.x

      - name: Format check
        run: deno run fmt --check

      - name: Lint
        run: deno lint

      - name: Type Check
        run: deno check

      - name: Test
        run: deno test

      - name: Publish check
        run: deno publish --dry-run
